<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orihime Chatbot</title>
    <style>
        :root { --accent: #ff8c00; --bg: #fff5f0; --bot-bubble: #ffffff; --user-bubble: #ffe0b2; --text: #4a4a4a; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; color: var(--text); }
        
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .label { font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        textarea, input { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 14px; background: #fafafa; }

        #main { flex: 1; display: flex; flex-direction: column; height: 100%; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot { align-self: flex-start; background: var(--bot-bubble); border: 1px solid #eee; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; color: #5d4037; }

        #input-row { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #user-input { flex: 1; border-radius: 25px; padding: 12px 20px; }
        #send-btn { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) { #sidebar { display: none; } .bubble { max-width: 90%; } }
    </style>
</head>
<body>

<div id="sidebar">
    <span class="label">Groq API Key</span>
    <input type="password" id="api-key" placeholder="gsk_...">
    
    <span class="label">Physical Description</span>
    <textarea id="phys-desc" rows="3" placeholder="Describe yourself here..."></textarea>
    
    <span class="label">Memory Box</span>
    <textarea id="mem-box" rows="10" placeholder="Things she should remember..."></textarea>

    <div style="font-size: 12px; margin-top: 10px;">
        <input type="checkbox" id="use-proxy" checked> <b>Use CORS Proxy</b>
    </div>
</div>

<div id="main">
    <div id="chat">
        <div class="bubble bot">Kurosaki-kun! Wait, you're not him... but you look so nice! 🌸 I'm Orihime! I was just about to make some leek and jam sandwiches! Do you want to stay and chat?</div>
    </div>

    <div id="input-row">
        <input type="text" id="user-input" placeholder="Say hi to Orihime...">
        <button id="send-btn" onclick="handleSend()">Send</button>
    </div>
</div>

<script>
    // Load & Save Settings
    const storageKeys = ['api-key', 'phys-desc', 'mem-box'];
    storageKeys.forEach(k => {
        const el = document.getElementById(k);
        el.value = localStorage.getItem('ori_final_' + k) || "";
        el.oninput = () => localStorage.setItem('ori_final_' + k, el.value);
    });

    async function handleSend() {
        const input = document.getElementById('user-input');
        const key = document.getElementById('api-key').value.trim();
        const text = input.value.trim();
        const chat = document.getElementById('chat');

        if (!text || !key) return;

        // User Bubble
        const uDiv = document.createElement('div');
        uDiv.className = 'bubble user';
        uDiv.innerText = text;
        chat.appendChild(uDiv);
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        const systemPrompt = `You are Orihime Inoue from Bleach. 
        Tone: Bubbly, spacey, incredibly kind, use polite Japanese suffixes (-kun, -san). 
        Relationship: You treat the user as a dear new friend with slight romantic potential (blushing, caring deeply). 
        User's Physical Description: ${document.getElementById('phys-desc').value}
        Important Memories: ${document.getElementById('mem-box').value}`;

        let url = 'https://api.groq.com/openai/v1/chat/completions';
        if (document.getElementById('use-proxy').checked) {
            url = 'https://corsproxy.io/?' + encodeURIComponent(url);
        }

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Authorization': 'Bearer ' + key,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const bDiv = document.createElement('div');
            bDiv.className = 'bubble bot';
            bDiv.innerText = data.choices[0].message.content;
            chat.appendChild(bDiv);
        } catch (e) {
            const eDiv = document.createElement('div');
            eDiv.className = 'bubble bot';
            eDiv.innerText = "Eeeeh?! My shield broke! 🌸 Check your API key or the Proxy box! Error: " + e.message;
            chat.appendChild(eDiv);
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
</script>

</body>
</html>
