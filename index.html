<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orihime Chatbot</title>
    <style>
        :root { --accent: #ff8c00; --bg: #fff5f0; --bot-bubble: #ffffff; --user-bubble: #ffe0b2; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .label { font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        textarea, input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; }
        
        #avatar-preview { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); display: block; margin: 0 auto; background: #eee; }

        #main { flex: 1; display: flex; flex-direction: column; height: 100%; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
        .bot-row { align-self: flex-start; }
        .user-row { align-self: flex-end; flex-direction: row-reverse; }

        .chat-av { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #ccc; }
        .bubble { padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot-row .bubble { background: var(--bot-bubble); border-bottom-left-radius: 2px; }
        .user-row .bubble { background: var(--user-bubble); border-bottom-right-radius: 2px; }

        #input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #user-input { flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px 20px; outline: none; }
        #send-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="text-align:center">
        <img id="avatar-preview" src="">
        <span class="label">Orihime's Face</span>
        <input type="file" id="pic-upload" accept="image/*" style="margin-top:5px; font-size: 10px;">
    </div>
    <span class="label">Groq API Key</span>
    <input type="password" id="api-key" placeholder="gsk_...">
    <span class="label">Physical Description</span>
    <textarea id="phys-desc" rows="3"></textarea>
    <span class="label">Global Memory</span>
    <textarea id="mem-box" rows="6"></textarea>
    <button onclick="clearChat()" style="font-size: 10px; background: #eee; border: 1px solid #ccc; cursor:pointer;">Clear Conversation Memory</button>
</div>

<div id="main">
    <div id="chat" id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Chat with Orihime...">
        <button id="send-btn" onclick="handleSend()">Send</button>
    </div>
</div>

<script>
    // 1. DATABASE LOGIC (For Profile Picture & Chat History)
    let db;
    const request = indexedDB.open("OrihimeDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("settings");
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadSettings();
    };

    function saveDB(key, val) {
        db.transaction("settings", "readwrite").objectStore("settings").put(val, key);
    }

    // 2. MEMORY & SETTINGS
    let chatHistory = JSON.parse(localStorage.getItem('ori_chat_history') || "[]");
    
    function loadSettings() {
        const tx = db.transaction("settings", "readonly").objectStore("settings");
        tx.get("avatar").onsuccess = e => { 
            if(e.target.result) document.getElementById('avatar-preview').src = e.target.result; 
        };
        ['api-key', 'phys-desc', 'mem-box'].forEach(id => {
            document.getElementById(id).value = localStorage.getItem('ori_v7_'+id) || "";
            document.getElementById(id).oninput = (e) => localStorage.setItem('ori_v7_'+id, e.target.value);
        });
        renderHistory();
    }

    document.getElementById('pic-upload').onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            saveDB("avatar", ev.target.result);
            document.getElementById('avatar-preview').src = ev.target.result;
            renderHistory(); // Refresh visuals
        };
        reader.readAsDataURL(file);
    };

    function clearChat() {
        chatHistory = [];
        localStorage.setItem('ori_chat_history', "[]");
        renderHistory();
    }

    // 3. CHAT LOGIC
    function renderHistory() {
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        const av = document.getElementById('avatar-preview').src;
        
        chatHistory.forEach(msg => {
            const row = document.createElement('div');
            row.className = `msg-row ${msg.role}-row`;
            const content = msg.content;
            if(msg.role === 'bot') {
                row.innerHTML = `<img class="chat-av" src="${av}"><div class="bubble">${content}</div>`;
            } else {
                row.innerHTML = `<div class="bubble">${content}</div>`;
            }
            chat.appendChild(row);
        });
        chat.scrollTop = chat.scrollHeight;
    }

    async function handleSend() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const key = document.getElementById('api-key').value.trim();
        if(!text || !key) return;

        chatHistory.push({ role: 'user', content: text });
        renderHistory();
        input.value = "";

        const system = `You are Orihime Inoue. You treat the user as a dear friend with romantic potential. You are bubbly, spacey, and polite. 
        USER DESC: ${document.getElementById('phys-desc').value}
        MEMORIES: ${document.getElementById('mem-box').value}`;

        // Prepare context (Last 10 messages)
        const context = chatHistory.slice(-10).map(m => ({
            role: m.role === 'bot' ? 'assistant' : 'user',
            content: m.content
        }));

        const url = 'https://corsproxy.io/?' + encodeURIComponent('https://api.groq.com/openai/v1/chat/completions');

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: system }, ...context]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            chatHistory.push({ role: 'bot', content: reply });
            localStorage.setItem('ori_chat_history', JSON.stringify(chatHistory));
            renderHistory();
        } catch (e) {
            alert("Error: " + e.message);
        }
    }

    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
</script>
</body>
</html>
