<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orihime Chat v9.0</title>
    <style>
        :root { --accent: #ff8c00; --bg: #fff5f0; --bot-bubble: #ffffff; --user-bubble: #ffe0b2; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .label { font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        textarea, input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; background: #fafafa; }
        #avatar-preview { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); display: block; margin: 0 auto; background: #eee; }
        
        #main { flex: 1; display: flex; flex-direction: column; height: 100%; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-row { display: flex; gap: 10px; align-items: flex-start; max-width: 90%; position: relative; }
        .bot-row { align-self: flex-start; }
        .user-row { align-self: flex-end; flex-direction: row-reverse; }
        .chat-av { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .bubble { padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot-row .bubble { background: var(--bot-bubble); border-top-left-radius: 2px; }
        .user-row .bubble { background: var(--user-bubble); border-top-right-radius: 2px; }

        .controls { display: flex; gap: 8px; margin-top: 5px; opacity: 0.5; font-size: 11px; }
        .ctrl-btn { cursor: pointer; background: none; border: none; color: #888; padding: 2px; }
        .ctrl-btn:hover { color: var(--accent); }

        #input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #user-input { flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px 20px; }
        #send-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="text-align:center">
        <img id="avatar-preview" src="">
        <span class="label">Orihime's Face</span>
        <input type="file" id="pic-upload" accept="image/*" style="margin-top:5px; font-size: 10px;">
    </div>
    
    <span class="label">Groq API Key</span>
    <input type="password" id="api-key" placeholder="gsk_...">
    
    <span class="label">Physical Description</span>
    <textarea id="phys-desc" rows="3" placeholder="How you look..."></textarea>
    
    <span class="label">Global Memory</span>
    <textarea id="mem-box" rows="8" placeholder="Things she must always remember..."></textarea>
    
    <button onclick="clearHistory()" style="margin-top:10px; font-size: 11px; cursor:pointer;">Wipe Chat History</button>
</div>

<div id="main">
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Message Orihime...">
        <button id="send-btn" onclick="handleSend()">Send</button>
    </div>
</div>

<script>
    let db;
    const request = indexedDB.open("OrihimeDB_v9", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("settings"); };
    request.onsuccess = e => { db = e.target.result; loadApp(); };

    let chatHistory = JSON.parse(localStorage.getItem('ori_v9_history') || "[]");

    function loadApp() {
        db.transaction("settings").objectStore("settings").get("avatar").onsuccess = e => {
            if(e.target.result) document.getElementById('avatar-preview').src = e.target.result;
        };
        ['api-key', 'phys-desc', 'mem-box'].forEach(id => {
            document.getElementById(id).value = localStorage.getItem('ori_v9_'+id) || "";
            document.getElementById(id).oninput = e => localStorage.setItem('ori_v9_'+id, e.target.value);
        });
        renderChat();
    }

    document.getElementById('pic-upload').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            db.transaction("settings", "readwrite").objectStore("settings").put(ev.target.result, "avatar");
            document.getElementById('avatar-preview').src = ev.target.result;
            renderChat();
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function renderChat() {
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        const av = document.getElementById('avatar-preview').src || "https://via.placeholder.com/150";

        chatHistory.forEach((msg, idx) => {
            const row = document.createElement('div');
            row.className = `msg-row ${msg.role}-row`;
            const isLastBot = (msg.role === 'bot' && idx === chatHistory.length - 1);
            
            row.innerHTML = `
                ${msg.role === 'bot' ? `<img class="chat-av" src="${av}">` : ''}
                <div style="flex:1">
                    <div class="bubble">${msg.content}</div>
                    <div class="controls">
                        <button class="ctrl-btn" onclick="deleteMsg(${idx})">🗑️ Delete</button>
                        ${isLastBot ? `<button class="ctrl-btn" onclick="refreshLast()">🔄 Refresh</button>` : ''}
                    </div>
                </div>
            `;
            chat.appendChild(row);
        });
        chat.scrollTop = chat.scrollHeight;
    }

    function deleteMsg(idx) {
        chatHistory.splice(idx, 1);
        saveAndRender();
    }

    function refreshLast() {
        if(chatHistory.length > 0 && chatHistory[chatHistory.length-1].role === 'bot') {
            chatHistory.pop();
            handleSend(true);
        }
    }

    async function handleSend(isRefresh = false) {
        const input = document.getElementById('user-input');
        const key = document.getElementById('api-key').value;
        const text = isRefresh ? chatHistory[chatHistory.length-1].content : input.value.trim();
        
        if(!text || !key) return;
        if(!isRefresh) { chatHistory.push({ role: 'user', content: text }); }
        
        renderChat();
        input.value = "";

        const system = `You are Orihime Inoue from Bleach. Bubbly, spacey, incredibly kind, romantic potential. Use -kun/-san. 
        USER PHYSICAL DESC: ${document.getElementById('phys-desc').value}
        GLOBAL MEMORY: ${document.getElementById('mem-box').value}`;

        const context = chatHistory.slice(-10).map(m => ({ role: m.role==='bot'?'assistant':'user', content: m.content }));
        const url = 'https://corsproxy.io/?' + encodeURIComponent('https://api.groq.com/openai/v1/chat/completions');

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system", content:system}, ...context] })
            });
            const data = await res.json();
            chatHistory.push({ role: 'bot', content: data.choices[0].message.content });
            saveAndRender();
        } catch (e) { alert("Error: " + e.message); }
    }

    function saveAndRender() {
        localStorage.setItem('ori_v9_history', JSON.stringify(chatHistory));
        renderChat();
    }

    function clearHistory() { chatHistory = []; saveAndRender(); }
    document.getElementById('user-input').onkeypress = e => e.key === 'Enter' && handleSend();
</script>
</body>
</html>
