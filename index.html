<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orihime Chat - Groq Powered</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --sidebar: #ffffff;
            --accent: #ff8c00; /* Orihime Orange */
            --text: #3c4043;
            --user-bubble: #e8f0fe;
            --bot-bubble: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        
        /* Layout */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        #chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Memory Box */
        .memory-box { border: 2px dashed var(--accent); border-radius: 12px; padding: 10px; margin-top: 10px; flex-grow: 1; overflow-y: auto; font-size: 0.9em; }
        .memory-title { font-weight: bold; color: var(--accent); margin-bottom: 5px; }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 1rem; position: relative; }
        .user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: var(--bot-bubble); border-bottom-left-radius: 4px; border: 1px solid #e0e0e0; }

        /* Input Bar */
        #input-area { padding: 20px; background: var(--bg); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 24px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-weight: bold; }
        
        #image-preview { display: none; width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #sidebar { display: none; } /* Simplified for mobile */
            .bubble { max-width: 90%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="memory-title">🌸 Memory Box</div>
    <div style="font-size: 0.8em; margin-bottom: 10px;">Things Orihime remembers about you:</div>
    <textarea id="memory-content" class="memory-box" placeholder="e.g. Likes spicy food, lives in Karakura Town..."></textarea>
    <input type="password" id="api-key" placeholder="Enter Groq API Key" style="margin-top:20px; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
</div>

<div id="chat-container">
    <div id="messages">
        <div class="bubble bot">H-hello! I'm Orihime Inoue! It's so nice to meet you! I was just about to have some bread with chocolate and sardines... do you want some? 🌸</div>
    </div>

    <div id="input-area">
        <input type="file" id="image-input" accept="image/*" style="display:none">
        <button onclick="document.getElementById('image-input').click()">📷</button>
        <img id="image-preview" src="">
        <input type="text" id="user-input" placeholder="Type a message to Orihime...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const memoryBox = document.getElementById('memory-content');
    const apiKeyInput = document.getElementById('api-key');
    const imageInput = document.getElementById('image-input');
    const imagePreview = document.getElementById('image-preview');

    let base64Image = null;

    // Load Memory from LocalStorage
    memoryBox.value = localStorage.getItem('orihime_memory') || "";
    memoryBox.addEventListener('input', () => localStorage.setItem('orihime_memory', memoryBox.value));

    // Handle Image Upload
    imageInput.onchange = evt => {
        const [file] = imageInput.files;
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                base64Image = e.target.result.split(',')[1];
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    };

    async function sendMessage() {
        const text = userInput.value;
        const apiKey = apiKeyInput.value;
        if (!text || !apiKey) { alert("Please enter a message and your Groq API Key!"); return; }

        appendMessage('user', text);
        userInput.value = '';
        
        const systemPrompt = `You are Orihime Inoue from Bleach. 
        Personality: Bubbly, kind-hearted, imaginative, and a bit spacey. You use many exclamation marks and often mention strange food combinations. 
        Relationship: You treat the user as a new, very dear friend. You are slightly shy but warm, with a hint of romantic potential (sweet blushing, caring deeply about their day).
        Context: You remember these things about the user: ${memoryBox.value}. 
        Constraint: Keep responses medium length and very friendly. Use polite Japanese suffixes like -kun or -san if appropriate, but speak primarily in English.`;

        const payload = {
            model: "llama-3.2-11b-vision-preview",
            messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: [
                    { type: "text", text: text },
                    ...(base64Image ? [{ type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Image}` } }] : [])
                ]}
            ]
        };

        // Reset image preview
        base64Image = null;
        imagePreview.style.display = 'none';

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            const reply = data.choices[0].message.content;
            appendMessage('bot', reply);
        } catch (err) {
            appendMessage('bot', "Oh no! My Shun Shun Rikka couldn't reach the server! Check your API key? 🌸");
        }
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    sendBtn.onclick = sendMessage;
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
